<div class="navbar">
  <div class="nav-container">
    <div class="logo">
      <img src="assets/logo-novo.png" alt="Logo Bertis">
    </div>

    <button class="menu-toggle" (click)="toggleMenu()">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>

    <nav class="nav-links" [class.active]="isMenuOpen">
      <a href="#inicio" (click)="toggleMenu()">Início</a>
      <a href="#quemsomos" (click)="toggleMenu()">Quem Somos</a>
      <a href="#paraquem" (click)="toggleMenu()">Quem atendemos</a>
      <a href="#servicos" (click)="toggleMenu()">Nossos Serviços</a>
      <a href="#contato" (click)="toggleMenu()">Contato</a>
      <!-- <a href="https://wa.me/5511988791883" target="_blank" class="btn-nav-mobile">Fale Conosco</a> -->
    </nav>
  </div>
</div>

<header class="hero-carousel" id="inicio">
  <div 
    *ngFor="let slide of slides; let i = index" 
    class="slide" 
    [class.active]="i === currentSlide"
  >
    <div class="slide-bg" [ngClass]="slide.imageClass"></div>
    <div class="slide-overlay"></div>
    
    <div class="hero-container">
      <div class="hero-content">
        <span class="badge">{{ slide.badge }}</span>
        <h2>{{ slide.title }}<br><span class="highlight">{{ slide.highlight }}</span></h2>
        <p>{{ slide.desc }} <b style="font-weight: bold;">impulsionar o seu negócio.</b></p>
        <div class="hero-actions">
          <!-- <a href="#servicos" class="btn-primary">Conhecer Soluções</a> -->
          <a href="https://instagram.com/bertiscontabil" target="_blank" class="btn-primary">
            <lucide-icon [img]="icons.instagram" class="icon"></lucide-icon>
            Instagram
          </a>
          <a href="https://wa.me/5511988791883" target="_blank" class="btn-secondary">
            <lucide-icon [img]="icons.phone" class="icon"></lucide-icon>
            11 98879-1883
          </a>
        </div>
      </div>
    </div>
  </div>

  <div class="carousel-indicators">
    <span 
      *ngFor="let slide of slides; let i = index" 
      class="dot" 
      [class.active]="i === currentSlide"
      (click)="setSlide(i)"
    ></span>
  </div>
</header>
